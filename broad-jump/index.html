<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>broad-jump - JUMP Cell Painting explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="bundle.css" />
</head>
<body>
<div id="app">
  <div id="mobile-toolbar">
    <select id="mobile-example-select">
      <option value="" disabled selected>Select an example...</option>
    </select>
  </div>
  <div id="sidebar">
    <div id="status" class="loading">Initializing...</div>
    <div class="sidebar-section">
      <h3>Tables</h3>
      <ul id="table-list" class="table-list"></ul>
    </div>
    <div class="sidebar-section">
      <h3>Upload</h3>
      <div class="file-input-wrapper">
        <input type="file" id="csv-upload" accept=".csv,.parquet" />
        <label for="csv-upload" class="file-input-label">Bring your own data</label>
      </div>
    </div>
    <div class="sidebar-section">
      <div id="examples-list"></div>
    </div>
  </div>
  <div id="editor-container"></div>
  <div id="viz-container">
    <div id="viz-output"></div>
  </div>
  <div id="error-panel">
    <h3 class="panel-label">Problems</h3>
    <div id="error-messages"></div>
  </div>
</div>
<script type="module" src="bundle.js"></script>
</body>
</html>
