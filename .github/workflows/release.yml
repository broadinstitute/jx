name: Release

# Single source of truth for releases: the `version` input below.
# This workflow rewrites CITATION.cff (version + date-released) on `main`,
# tags the resulting commit, and creates a GitHub Release that Zenodo
# archives. Do NOT hand-edit `version:` / `date-released:` in CITATION.cff
# between releases — this workflow owns them.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (no leading v, e.g. 0.0.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        run: |
          echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "version must be semver without leading v"; exit 1; }

      - name: Update CITATION.cff
        run: |
          yq -i '.version = "${{ inputs.version }}"' CITATION.cff
          yq -i ".\"date-released\" = \"$(date -u +%Y-%m-%d)\"" CITATION.cff

      - name: Commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git commit -m "release: v${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --target main \
            --title "v${{ inputs.version }}" \
            --generate-notes
