name: Publish WASM notebooks

# Builds a WASM bundle for every `notebooks/nb*.py` on push to `main`,
# stitches them together with an index page, and deploys to GitHub Pages.
# New notebooks are picked up automatically — drop a `nb10_*.py` into
# `notebooks/`, push, and it appears on the index without touching this file.
#
# `marimo export html-wasm` only assembles the static bundle; it does NOT
# validate that the notebook's deps actually install in Pyodide. A notebook
# that uses native-only packages (anndata, scipy submodules without wheels,
# jump-portrait, etc.) will produce a bundle that fails at user load time.
# If that happens, either: (a) refactor the notebook to WASM-friendly deps,
# or (b) add the filename to `EXCLUDE` below to skip publishing it.

on:
  push:
    branches: [main]
    paths:
      - 'notebooks/nb*.py'
      - '.github/workflows/publish-wasm.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Notebooks to skip (one path per line, exact match against the glob).
      # Remove a line once you've confirmed the bundle loads cleanly in Pyodide.
      EXCLUDE: |
        notebooks/nb01_retrieve_profiles.py
        notebooks/nb02_add_metadata.py
        notebooks/nb03_calculate_activity.py
        notebooks/nb04_display_images.py
        notebooks/nb05_explore_similarity.py
        notebooks/nb06_query_genes.py
        notebooks/nb07_compound_neighborhood.py
        notebooks/nb09_jumprr_matches.py
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4

      - name: Build WASM bundles
        run: |
          set -euo pipefail
          mkdir -p _site
          declare -a built=() failed=() skipped=()
          mapfile -t exclude_list < <(printf '%s\n' "${EXCLUDE}" | sed '/^$/d')

          for nb in notebooks/nb*.py; do
            name="$(basename "$nb" .py)"
            if printf '%s\n' "${exclude_list[@]}" | grep -qxF "$nb"; then
              skipped+=("$name")
              echo "::notice::skipping $nb (in EXCLUDE)"
              continue
            fi
            echo "::group::Building $name"
            if uvx marimo export html-wasm --mode run -o "_site/$name" "$nb" 2>&1; then
              built+=("$name")
              echo "::endgroup::"
            else
              failed+=("$name")
              echo "::endgroup::"
              echo "::warning::Failed to build $name (continuing)"
            fi
          done

          # Index page
          {
            cat <<'HTML'
          <!DOCTYPE html>
          <html lang="en"><head>
          <meta charset="utf-8">
          <title>jx — WASM notebooks</title>
          <style>
            body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                   max-width: 760px; margin: 3em auto; padding: 0 1.2em; line-height: 1.55;
                   color: #222; }
            h1 { border-bottom: 1px solid #ccc; padding-bottom: 0.3em; }
            h2 { margin-top: 2em; font-size: 1.1em; color: #555;
                 border-bottom: 1px solid #eee; padding-bottom: 0.2em; }
            ul { list-style: none; padding: 0; }
            li { padding: 0.5em 0; border-bottom: 1px solid #f0f0f0; }
            li a { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                   text-decoration: none; color: #0d47a1; font-size: 1em; }
            li a:hover { text-decoration: underline; }
            .skipped { color: #999; font-family: ui-monospace, monospace; font-size: 0.9em; }
            .note { background: #fafafa; border-left: 3px solid #aaa;
                    padding: 0.5em 1em; margin: 1em 0; font-size: 0.95em; }
          </style>
          </head><body>
          <h1>jx — WASM notebooks</h1>
          <p class="note">
            Self-contained marimo notebooks compiled to WebAssembly. Cold load takes
            10–30 s while Pyodide + per-notebook deps stream into the browser.
            Source: <a href="https://github.com/broadinstitute/jx">broadinstitute/jx</a>.
          </p>
          <h2>Notebooks</h2>
          <ul>
          HTML
            for name in "${built[@]}"; do
              echo "<li><a href=\"./$name/\">$name</a></li>"
            done
            echo '</ul>'
            if [ ${#failed[@]} -gt 0 ]; then
              echo '<h2>Failed builds</h2><ul>'
              for name in "${failed[@]}"; do
                echo "<li class=\"skipped\">$name (see workflow logs)</li>"
              done
              echo '</ul>'
            fi
            if [ ${#skipped[@]} -gt 0 ]; then
              echo '<h2>Skipped (EXCLUDE)</h2><ul>'
              for name in "${skipped[@]}"; do
                echo "<li class=\"skipped\">$name</li>"
              done
              echo '</ul>'
            fi
            echo '</body></html>'
          } > _site/index.html

          echo "Built:   ${built[*]:-(none)}"
          echo "Failed:  ${failed[*]:-(none)}"
          echo "Skipped: ${skipped[*]:-(none)}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
